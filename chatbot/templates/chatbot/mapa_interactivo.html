<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Malla Curricular - Interactiva</title>

    <!-- LeaderLine -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/leader-line/1.0.7/leader-line.min.js"></script>

    <style>

        * {
            box-sizing: border-box;
        }

        body {
            background-color: #0f172a;
            color: #f8fafc;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 30px;
            overflow-x: visible;
        }

        .header {
            text-align: center;
            margin-bottom: 60px;
        }

        .header h2 {
            margin-bottom: 10px;
        }

        .leyenda {
            color: #94a3b8;
            font-size: 0.9rem;
            margin-top: 20px;
        }

        .plan-container {
            display: flex;
            flex-direction: column;
            gap: 35px;
            align-items: flex-start;
            position: relative;
            padding-bottom: 120px;
        }

        .cuatrimestre {
            display: flex;
            gap: 20px;
            align-items: center;
            position: relative;
        }

        .etiqueta-semestre {
            width: 120px;
            text-align: right;
            color: #64748b;
            font-size: 0.8rem;
            text-transform: uppercase;
            flex-shrink: 0;
            line-height: 1.4;
        }

        .materia-node {
            width: 200px;
            min-height: 90px;
            background-color: #1e293b;
            border: 2px solid #334155;
            border-radius: 10px;
            padding: 12px;
            cursor: pointer;

            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;

            text-align: center;

            transition: all 0.25s ease;

            position: relative;
            z-index: 10;
        }

        .materia-node:hover {
            transform: translateY(-3px);
        }

        .materia-nombre {
            font-size: 0.9rem;
            font-weight: bold;
            line-height: 1.3;
        }

        .materia-estado {
            margin-top: 10px;
            font-size: 0.65rem;
            letter-spacing: 1px;
            font-weight: bold;
        }

        /* =========================
           ESTADOS
        ========================= */

        .materia-node.regular {
            border-color: #eab308;
        }

        .materia-node.regular .materia-estado {
            color: #eab308;
        }

        .materia-node.aprobada {
            border-color: #22c55e;
            background-color: rgba(34,197,94,0.08);
        }

        .materia-node.aprobada .materia-estado {
            color: #22c55e;
        }

        .materia-node.puedo-cursar {
            border-color: #f8fafc;
            box-shadow: 0 0 18px rgba(255,255,255,0.08);
        }

        .materia-node.puedo-cursar .materia-estado {
            color: #f8fafc;
        }

        .materia-node.pendiente .materia-estado {
            opacity: 0;
        }

    </style>
</head>

<body>

    <div class="header">

        <h2>LSI - PLAN 2011</h2>

        <p>Correlativas</p>

        <div class="leyenda">
            Click 1x = Regular |
            Click 2x = Aprobada |
            Click 3x = Reiniciar
        </div>

    </div>

    <div class="plan-container" id="grafo"></div>

    <script>

        // ==========================================
        // DATOS
        // ==========================================

        // Si estás usando Django:
        //
        // const planEstudiosDjango =
        // JSON.parse('{{ plan_estudios_json|escapejs }}');

       // ==========================================
// PLAN DE ESTUDIOS COMPLETO
// ==========================================

const planEstudiosDjango = {

        1: {

            101: "Algoritmos y Estructuras de Datos I",
            102: "Álgebra",
            103: "Algoritmos y Estructuras de Datos II",
            104: "Lógica y Matemática Computacional",
            105: "Sistemas y Organizaciones"
        },

        2: {

            201: "Paradigmas y Lenguajes",
            202: "Arquitectura y Organización de Computadoras",
            203: "Cálculo Diferencial e Integral",
            204: "Programación Orientada a Objetos",
            205: "Sistemas Operativos",
            206: "Administración y Gestión de Organizaciones"
        },

        3: {

            301: "Taller de Programación I",
            302: "Comunicaciones de Datos",
            303: "Ingeniería de Software I",
            304: "Taller de Programación II",
            305: "Probabilidad y Estadística",
            306: "Bases de Datos I",
            307: "Inglés Técnico Informático"
        },

        4: {

            401: "Ingeniería de Software II",
            402: "Economía Aplicada",
            403: "Teoría de la Computación",
            404: "Redes de Datos",
            405: "Bases de Datos II",
            406: "Métodos Computacionales"
        },

        5: {

            501: "Proyecto Final de Carrera",
            502: "Auditoría y Seguridad Informática",
            503: "Optativa I",
            504: "Optativa II",
            505: "Optativa III"
        }
    };

    // ==========================================
    // CORRELATIVAS PARA CURSAR
    // ==========================================

    const reglasCorrelativas = {

        // ======================================
        // SEGUNDO AÑO
        // ======================================

        201: [103],

        202: [104],

        203: [104],

        204: [201],

        205: [202],

        206: [105],

        // ======================================
        // TERCER AÑO
        // ======================================

        301: [204],

        302: [205],

        303: [204, 206],

        304: [301, 303],

        305: [203],

        306: [204],

        // ======================================
        // CUARTO AÑO
        // ======================================

        401: [303],

        402: [303],

        403: [305],

        404: [302],

        405: [306],

        406: [305],

        // ======================================
        // QUINTO AÑO
        // ======================================

        501: [404, 405],

        502: [404, 405],

        503: [403],

        504: [404],

        505: [405]
    };
        // ==========================================
        // VARIABLES
        // ==========================================

        let materias = [];

        let lineas = [];

        // ==========================================
        // GENERAR ARRAY
        // ==========================================

        for (const [anio, materiasAnio]
            of Object.entries(planEstudiosDjango)) {

            for (const [idStr, nombreMateria]
                of Object.entries(materiasAnio)) {

                const idNum = parseInt(idStr);

                materias.push({

                    id: idNum,

                    cuatrimestre: parseInt(anio),

                    nombre: nombreMateria,

                    estado: 0,

                    req_cursar:
                        reglasCorrelativas[idNum] || []
                });
            }
        }

        console.log("Materias:", materias);

        // ==========================================
        // RENDER
        // ==========================================

        function renderizarGrafo() {

            const contenedor =
                document.getElementById('grafo');

            contenedor.innerHTML = '';

            const cuatrimestres =
                [...new Set(
                    materias.map(m => m.cuatrimestre)
                )];

            cuatrimestres.forEach(cuat => {

                const fila =
                    document.createElement('div');

                fila.className = 'cuatrimestre';

                const etiqueta =
                    document.createElement('div');

                etiqueta.className =
                    'etiqueta-semestre';

                etiqueta.innerHTML =
                    `${cuat}°<br>CUATRIMESTRE`;

                fila.appendChild(etiqueta);

                const materiasCuat =
                    materias.filter(
                        m => m.cuatrimestre === cuat
                    );

                materiasCuat.forEach(mat => {

                    const nodo =
                        document.createElement('div');

                    nodo.className =
                        'materia-node pendiente';

                    nodo.id = `mat-${mat.id}`;

                    nodo.onclick =
                        () => cambiarEstado(mat.id);

                    nodo.innerHTML = `

                        <div class="materia-nombre">
                            ${mat.nombre}
                        </div>

                        <div class="materia-estado"
                             id="lbl-${mat.id}">
                            PENDIENTE
                        </div>
                    `;

                    fila.appendChild(nodo);
                });

                contenedor.appendChild(fila);
            });

            evaluarCorrelativas();
        }

        // ==========================================
        // CAMBIAR ESTADO
        // ==========================================

        function cambiarEstado(id) {

            const mat =
                materias.find(m => m.id === id);

            mat.estado =
                (mat.estado + 1) % 3;

            evaluarCorrelativas();

            setTimeout(() => {

                dibujarFlechas();

            }, 50);
        }

        // ==========================================
        // EVALUAR
        // ==========================================

        function evaluarCorrelativas() {

            materias.forEach(mat => {

                const nodo =
                    document.getElementById(
                        `mat-${mat.id}`
                    );

                const label =
                    document.getElementById(
                        `lbl-${mat.id}`
                    );

                nodo.className =
                    'materia-node';

                if (mat.estado === 1) {

                    nodo.classList.add('regular');

                    label.innerText = 'REGULAR';

                    label.style.opacity = '1';
                }

                else if (mat.estado === 2) {

                    nodo.classList.add('aprobada');

                    label.innerText = 'APROBADA';

                    label.style.opacity = '1';
                }

                else {

                    let cumpleRequisitos = true;

                    mat.req_cursar.forEach(reqId => {

                        const correlativa =
                            materias.find(
                                m => m.id === reqId
                            );

                        if (!correlativa ||
                            correlativa.estado === 0) {

                            cumpleRequisitos = false;
                        }
                    });

                    if (cumpleRequisitos) {

                        nodo.classList.add(
                            'puedo-cursar'
                        );

                        label.innerText =
                            'PUEDO CURSAR';

                        label.style.opacity = '1';
                    }

                    else {

                        nodo.classList.add(
                            'pendiente'
                        );

                        label.innerText =
                            'PENDIENTE';

                        label.style.opacity = '0';
                    }
                }
            });
        }

        // ==========================================
        // DIBUJAR FLECHAS
        // ==========================================

        function dibujarFlechas() {
            // 1. Borrar líneas anteriores para no superponerlas al actualizar
            lineas.forEach(l => l.remove());
            lineas = [];

            materias.forEach(mat => {
                if (!mat.req_cursar || mat.req_cursar.length === 0) return;

                mat.req_cursar.forEach(reqId => {
                    const inicioNode = document.getElementById(`mat-${reqId}`);
                    const finNode = document.getElementById(`mat-${mat.id}`);
                    
                    // Buscamos el estado actual de la materia que sirve de requisito
                    const matRequisito = materias.find(m => m.id === reqId);

                    if (!inicioNode || !finNode || !matRequisito) return;

                    // 2. Lógica de colores dinámica según el estado del requisito
                    let colorLinea = 'rgba(148, 163, 184, 0.25)'; // Gris opaco por defecto (Pendiente)
                    let grosor = 2.5;

                    if (matRequisito.estado === 1) {
                        colorLinea = 'rgba(234, 179, 8, 0.6)'; // Amarillo brillante (Regular)
                        grosor = 3.5; // La hacemos más gruesa para destacar
                    } 
                    else if (matRequisito.estado === 2) {
                        colorLinea = 'rgba(34, 197, 94, 0.6)'; // Verde brillante (Aprobada)
                        grosor = 3.5;
                    }

                    // 3. Trazar la línea
                    const linea = new LeaderLine(
                        inicioNode,
                        finNode,
                        {
                            color: colorLinea,
                            size: grosor,
                            path: 'fluid',
                            startSocket: 'bottom',
                            endSocket: 'top',
                            startPlug: 'behind',
                            endPlug: 'arrow1',
                            endPlugSize: 1.5,
                            startSocketGravity: [0, 50],
                            endSocketGravity: [0, -50],
                            dash: false,
                            dropShadow: false,
                            outline: false
                        }
                    );

                    lineas.push(linea);
                });
            });

            // 4. Mandar las flechas al fondo para que no bloqueen los clics
            document.querySelectorAll('.leader-line').forEach(line => {
                line.style.zIndex = "-1";
            });
        }

        // ==========================================
        // INIT
        // ==========================================

        window.onload = () => {

            renderizarGrafo();

            setTimeout(() => {

                dibujarFlechas();

            }, 500);
        };

        // Redibujar al resize

        window.addEventListener(
            'resize',
            () => {

                dibujarFlechas();
            }
        );

    </script>

</body>
</html>
